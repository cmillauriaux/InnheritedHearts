name: Export Story

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  export:
    name: Export ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: Windows
            platform-id: windows
            runner: ubuntu-latest
            artifact-name: innherited-hearts-windows
          - platform: macOS
            platform-id: macos
            runner: macos-latest
            artifact-name: innherited-hearts-macos
          - platform: Web
            platform-id: web
            runner: ubuntu-latest
            artifact-name: innherited-hearts-web

    steps:
      - name: Checkout Story
        uses: actions/checkout@v4
        with:
          path: story

      - name: Checkout Builder
        uses: actions/checkout@v4
        with:
          repository: cmillauriaux/visual-builder
          path: visual-builder
          # token: ${{ secrets.GH_PAT }} # Décommentez si le dépôt est privé

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.4.1
          use-dotnet: false
          include-templates: true

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y rsync ffmpeg

      - name: Export Story using Builder Script
        env:
          STORY_PATH: ${{ github.workspace }}/story
          GODOT_BIN: godot
        run: |
          cd visual-builder
          chmod +x scripts/export_story.sh
          # On exporte dans le dossier build à la racine de l'espace de travail
          ./scripts/export_story.sh "$STORY_PATH" \
            -p ${{ matrix.platform-id }} \
            -o ../build \
            --godot "$GODOT_BIN"

      - name: Post-process macOS
        if: matrix.platform == 'macOS'
        run: |
          # Le script crée build/story_macos/
          cd build/story_macos
          # On cherche l'app ou le zip généré
          APP_NAME=$(find . -name "*.app" -type d -maxdepth 2 | head -n 1)
          if [ -d "$APP_NAME" ]; then
            chmod +x "$APP_NAME/Contents/MacOS/"*
            codesign --force --deep -s - "$APP_NAME"
            zip -r -y InnheritedHearts-macOS.zip "$APP_NAME"
          fi

      - name: Zip Web Build
        if: matrix.platform == 'Web'
        run: |
          cd build/story_web
          zip -r ../innherited-hearts-web.zip .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: |
            ${{ matrix.platform == 'Web' && 'build/innherited-hearts-web.zip' || 
               (matrix.platform == 'macOS' && 'build/story_macos/InnheritedHearts-macOS.zip' || 
               'build/story_windows/') }}

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: export
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: innherited-hearts-windows
          path: build/windows

      - name: Download macOS Artifact
        uses: actions/download-artifact@v4
        with:
          name: innherited-hearts-macos
          path: build/macos

      - name: Download Web Artifact
        uses: actions/download-artifact@v4
        with:
          name: innherited-hearts-web
          path: build/web

      - name: Prepare Release Files
        id: prep
        run: |
          TAG_NAME="v$(date +'%Y.%m.%d')-b${{ github.run_number }}"
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT

          # On cherche l'exécutable Windows dans le dossier exporté par le script
          WIN_EXE=$(find build/windows -name "*.exe" | head -n 1)
          mv "$WIN_EXE" build/InnheritedHearts-$TAG_NAME-Windows.exe
          
          # Pour macOS et Web, ce sont déjà des zips
          mv build/macos/InnheritedHearts-macOS.zip build/InnheritedHearts-$TAG_NAME-macOS.zip
          mv build/web/innherited-hearts-web.zip build/InnheritedHearts-$TAG_NAME-Web.zip

          echo "win_file=build/InnheritedHearts-$TAG_NAME-Windows.exe" >> $GITHUB_OUTPUT
          echo "mac_file=build/InnheritedHearts-$TAG_NAME-macOS.zip" >> $GITHUB_OUTPUT
          echo "web_file=build/InnheritedHearts-$TAG_NAME-Web.zip" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.prep.outputs.tag_name }}
          name: Innherited Hearts ${{ steps.prep.outputs.tag_name }}
          body: |
            Build automatique synchronisé avec Visual Builder.
            
            Version : ${{ steps.prep.outputs.tag_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            ${{ steps.prep.outputs.win_file }}
            ${{ steps.prep.outputs.mac_file }}
            ${{ steps.prep.outputs.web_file }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
