name: Export Story

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  export:
    name: Export ${{ matrix.platform }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: Windows
            export-name: Windows
            output-path: build/windows/InnheritedHearts.exe
            artifact-name: innherited-hearts-windows
            artifact-path: build/windows/
          - platform: macOS
            export-name: macOS
            output-path: build/macos/InnheritedHearts.zip
            artifact-name: innherited-hearts-macos
            artifact-path: build/macos/
          - platform: Web
            export-name: Web
            output-path: build/web/index.html
            artifact-name: innherited-hearts-web
            artifact-path: build/web/

    steps:
      - name: Checkout Story
        uses: actions/checkout@v4
        with:
          path: story

      - name: Checkout Builder
        uses: actions/checkout@v4
        with:
          repository: cmillauriaux/visual-builder
          path: visual-builder
          # SI LE DEPOT EST PRIVE : Décommentez la ligne suivante et créez un secret GH_PAT
          # token: ${{ secrets.GH_PAT }}

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.4.1
          use-dotnet: false
          include-templates: true

      - name: Prepare Project
        run: |
          # Créer le dossier story dans le builder et y copier les fichiers de l'histoire
          mkdir -p visual-builder/story
          # On exclut le dossier .git et .github lors de la copie
          rsync -av --exclude='.git/' --exclude='.github/' story/ visual-builder/story/
          
          # Patch game.tscn pour définir story_path = "res://story"
          # On insère la ligne avant le script pour que ce soit pris en compte comme une propriété exportée
          sed -i '/script = ExtResource("1")/i story_path = "res://story"' visual-builder/src/game.tscn
          
          # Ajouter le preset Web si absent
          if ! grep -q 'name="Web"' visual-builder/export_presets.cfg; then
            cat <<EOF >> visual-builder/export_presets.cfg

[preset.2]
name="Web"
platform="Web"
runnable=true
dedicated_server=false
custom_features=""
export_filter="all_resources"
include_filter=""
exclude_filter="specs/*, .claude/*"
export_path="build/web/index.html"
encryption_include_filters=""
encryption_exclude_filters=""
encrypt_pck=false
encrypt_directory=false

[preset.2.options]
custom_template/debug=""
custom_template/release=""
variant/extensions_support=false
vram_texture_compression/for_desktop=true
vram_texture_compression/for_mobile=false
html/export_icon=true
html/custom_html_shell=""
html/head_include=""
html/canvas_resize_policy=2
html/focus_canvas_on_start=true
html/experimental_virtual_keyboard=false
progressive_web_app/enabled=false
progressive_web_app/offline_cache=true
progressive_web_app/display=1
progressive_web_app/orientation=0
progressive_web_app/icon_144x144=""
progressive_web_app/icon_180x180=""
progressive_web_app/icon_192x192=""
progressive_web_app/icon_512x512=""
progressive_web_app/background_color=Color(0, 0, 0, 1)
EOF
          fi

      - name: Import Resources
        run: |
          cd visual-builder
          godot --headless --verbose --editor --quit --path .

      - name: Create Build Directory
        run: mkdir -v -p visual-builder/$(dirname ${{ matrix.output-path }})

      - name: Export Build
        run: |
          cd visual-builder
          godot --headless --verbose --path . --export-release "${{ matrix.export-name }}" "${{ matrix.output-path }}"

      - name: Zip Web Build
        if: matrix.platform == 'Web'
        run: |
          cd visual-builder/build/web
          zip -r ../../innherited-hearts-web.zip .
          cd ../..
          mkdir -p web-zip
          mv innherited-hearts-web.zip web-zip/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: |
            ${{ matrix.platform == 'Web' && 'visual-builder/web-zip/innherited-hearts-web.zip' || format('visual-builder/{0}', matrix.output-path) }}

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: export
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: innherited-hearts-windows
          path: build/windows

      - name: Download macOS Artifact
        uses: actions/download-artifact@v4
        with:
          name: innherited-hearts-macos
          path: build/macos

      - name: Download Web Artifact
        uses: actions/download-artifact@v4
        with:
          name: innherited-hearts-web
          path: build/web

      - name: Prepare Release Files
        id: prep
        run: |
          TAG_NAME="v$(date +'%Y.%m.%d')-b${{ github.run_number }}"
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          
          # Renommage des fichiers pour inclure le tag
          # Attention aux chemins de téléchargement
          find build -name "*.exe" -exec mv {} build/InnheritedHearts-$TAG_NAME-Windows.exe \;
          find build -name "*.zip" -exec mv {} build/InnheritedHearts-$TAG_NAME-tmp.zip \;
          
          # Gestion spécifique pour différencier macOS et Web (les deux sont en .zip potentiellement)
          # On sait que macOS est dans build/macos et Web est le zip qu'on a créé
          mv build/windows/InnheritedHearts.exe build/InnheritedHearts-$TAG_NAME-Windows.exe || true
          mv build/macos/InnheritedHearts.zip build/InnheritedHearts-$TAG_NAME-macOS.zip || true
          mv build/web/innherited-hearts-web.zip build/InnheritedHearts-$TAG_NAME-Web.zip || true

          echo "win_file=build/InnheritedHearts-$TAG_NAME-Windows.exe" >> $GITHUB_OUTPUT
          echo "mac_file=build/InnheritedHearts-$TAG_NAME-macOS.zip" >> $GITHUB_OUTPUT
          echo "web_file=build/InnheritedHearts-$TAG_NAME-Web.zip" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.prep.outputs.tag_name }}
          name: Innherited Hearts ${{ steps.prep.outputs.tag_name }}
          body: |
            Build automatique de l'histoire pour la version ${{ steps.prep.outputs.tag_name }}

            ### Téléchargements
            * **Windows**: `InnheritedHearts-${{ steps.prep.outputs.tag_name }}-Windows.exe`
            * **macOS**: `InnheritedHearts-${{ steps.prep.outputs.tag_name }}-macOS.zip`
            * **Web**: `InnheritedHearts-${{ steps.prep.outputs.tag_name }}-Web.zip`
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            ${{ steps.prep.outputs.win_file }}
            ${{ steps.prep.outputs.mac_file }}
            ${{ steps.prep.outputs.web_file }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
