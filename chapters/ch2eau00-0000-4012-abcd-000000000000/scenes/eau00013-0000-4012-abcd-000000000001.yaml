        character: "Zven"
        text: "Hé ! C'est Zven ! Je peux entrer ?!"
        foregrounds:
          - uuid: "0192bc45-74d0-4985-e4d8-bbbe5e4e2958"
            name: ""
            image: "assets/foregrounds/ai_1772887383_13332.png"
            z_order: 0
            opacity: 1.0
            flip_h: false
            flip_v: false
            scale: 0.72009932373653
