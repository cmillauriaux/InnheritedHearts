    dialogues:
      - uuid: "eau13dia1-seq1-4012-abcd-000000000001"
        character: "Zven"
        text: "Hé ! C'est Zven ! Je peux entrer ?!"
        foregrounds: []
      - uuid: "eau13dia2-seq1-4012-abcd-000000000002"
        character: "Zven"
        text: "Oh ! C'est trop gentil d'avoir pensé à moi ! Je suis tellement touchée !"
        foregrounds: []
      - uuid: "eau13dia3-seq1-4012-abcd-000000000003"
        character: "Zven"
        text: "Le fait que tu aies pensé à moi... ça me fait vraiment plaisir. Je me sens incluse, tu vois ? C'est pas toujours facile d'être loin de chez soi."
        foregrounds: []
      - uuid: "eau13dia4-seq1-4012-abcd-000000000004"
        character: "Zven"
        text: "De toute façon, sans eau chaude, je serais allée au ruisseau derrière l'auberge ! Ou ailleurs ! J'aurais trouvé à me laver !"
        foregrounds: []
      - uuid: "eau13dia5-seq1-4012-abcd-000000000005"
        character: "Zven"
        text: "Sur mon île, on n'a pas d'eau chaude, tu sais. On se lave dans le ruisseau ! Mais ici, l'eau chaude c'est... c'est magique ! C'est tellement agréable !"
        foregrounds: []
      - uuid: "eau13dia6-seq1-4012-abcd-000000000006"
        character: "Zven"
        text: "Merci encore ! T'es vraiment quelqu'un de bien ! Bonne nuit !"
        foregrounds: []
      - uuid: "eau13dia7-seq1-4012-abcd-000000000007"
        character: "Joueur"
        text: "Bonne nuit, Zven. Content que ça te fasse plaisir."
        foregrounds: []
