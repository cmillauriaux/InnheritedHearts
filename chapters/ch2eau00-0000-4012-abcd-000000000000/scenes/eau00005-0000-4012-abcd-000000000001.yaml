        text: "Oh non..."
        foregrounds: []
      - uuid: "eau05di11-seq1-4012-abcd-000000000006"
        character: "Mary"
        text: "Mais... et ma présentation de demain ? Je ne peux pas y aller comme ça !"
        foregrounds: []
      - uuid: "eau05di12-seq1-4012-abcd-000000000007"
        character: "Alicia"
        text: "La situation est des plus fâcheuses. Il va falloir trouver une solution."
        foregrounds: []
      - uuid: "eau05di13-seq1-4012-abcd-000000000008"
        character: "Zven"
        text: "C'est pas grave ! On trouvera un moyen ! Chez moi on se débrouillait toujours !"
        foregrounds: []
      - uuid: "eau05dia4-seq1-4012-abcd-000000000004"
        character: "Joueur"
        text: "J'irai en ville demain matin pour essayer de trouver un réparateur ou un nouveau chauffe-eau. Je suis désolé."
        foregrounds: []
      - uuid: "eau05dia5-seq1-4012-abcd-000000000005"
