      - uuid: "eau05dia1-seq1-4012-abcd-000000000001"
        character: "Joueur"
        text: "Les filles... J'ai une mauvaise nouvelle. Je suis descendu voir le chauffe-eau et il est complètement mort. Impossible de le réparer."
        foregrounds: []
      - uuid: "eau05dia2-seq1-4012-abcd-000000000002"
        character: "Lola"
        text: "Quoi ?! Pas d'eau chaude du tout ?! Mais c'est une catastrophe !"
        foregrounds: []
