            transition_type: "none"
            transition_duration: 0.5
      - uuid: "eau11dia2-seq1-4012-abcd-000000000002"
        character: "Lola"
        text: "Oh merci merci merci ! Tu es un ange ! Un vrai sauveur !"
        foregrounds: []
      - uuid: "eau11dia3-seq1-4012-abcd-000000000003"
        character: "Lola"
        text: "Tu sais, en tant qu'infirmière, l'hygiène c'est FONDAMENTAL. On ne rigole pas avec ça. Les bactéries, les microbes, tu n'imagines même pas ce que je vois au quotidien !"
        foregrounds: []
      - uuid: "eau11dia4-seq1-4012-abcd-000000000004"
        character: "Lola"
        text: "D'ailleurs tu savais que le corps humain héberge plus de bactéries que de cellules ? C'est fascinant et terrifiant à la fois ! Et l'eau chaude est essentielle pour éliminer les agents pathogènes de la surface cutanée..."
        foregrounds: []
      - uuid: "eau11dia5-seq1-4012-abcd-000000000005"
        character: "Joueur"
        text: "..."
        foregrounds: []
      - uuid: "eau11dia6-seq1-4012-abcd-000000000006"
        character: "Lola"
        text: "Et sans parler des infections nosocomiales ! Si tu savais les protocoles d'hygiène qu'on doit respecter à l'hôpital ! Le lavage des mains à lui seul prend trente secondes minimum selon l'OMS et..."
        foregrounds: []
      - uuid: "eau11dia7-seq1-4012-abcd-000000000007"
        character: "Lola"
        text: "Enfin bref ! Merci encore ! Tu es formidable ! Bonne nuit !"
        foregrounds: []
      - uuid: "eau11dia8-seq1-4012-abcd-000000000008"
        character: "Joueur"
        text: "Elle ne m'a encore pas laissé en placer une..."
