        character: "Lola"
        text: "Coucou ! C'est moi ! Je peux entrer ?"
        foregrounds:
          - uuid: "e6004276-b3de-4fc5-2860-9d9cc0bc41d6"
            name: ""
            image: "assets/foregrounds/ai_1772887638_64696.png"
