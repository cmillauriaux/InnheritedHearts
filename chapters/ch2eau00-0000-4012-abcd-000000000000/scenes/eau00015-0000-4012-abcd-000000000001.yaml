      - uuid: "eau15di17-seq1-4012-abcd-000000000017"
        character: "Zven"
        text: "Chez moi, sur l'île, on se lave tous les jours dans la rivière. C'est normal. Mais ici, les gens ne savent pas ça."
        foregrounds: []
      - uuid: "eau15di18-seq1-4012-abcd-000000000018"
        character: "Zven"
        text: "Si je ne me lave pas... j'ai peur que les gens pensent que c'est parce que je ne sais pas me laver. Que sur mon île, on est sales. Que je suis l'étrangère qui pue."
        foregrounds: []
      - uuid: "eau15di19-seq1-4012-abcd-000000000019"
        character: "Zven"
        text: "Je sais que c'est bête. Mais je ne veux pas qu'on me regarde comme ça. Pas ici. Pas maintenant que je commence à me sentir chez moi."
        foregrounds: []
      - uuid: "eau15di20-seq1-4012-abcd-000000000020"
        character: "Joueur"
        text: "..."
        foregrounds: []
      - uuid: "eau15di21-seq1-4012-abcd-000000000021"
        character: "Joueur"
        text: "D'accord. J'ai entendu tout le monde. Chacune a ses raisons, et elles sont toutes légitimes."
        foregrounds: []
      - uuid: "eau15di22-seq1-4012-abcd-000000000022"
        character: "Joueur"
        text: "Mais il n'y a qu'une seule douche chaude ce soir. Il va falloir que je tranche."
