        text: "Toute intervention sur un spécimen requiert un état de pureté corporelle irréprochable. On ne touche pas à la mort avec des mains souillées."
        foregrounds: []
      - uuid: "eau15di13-seq1-4012-abcd-000000000013"
        character: "Alicia"
        text: "De plus, l'odeur du formol sur une peau non lavée est... comment dire... une expérience que l'on ne souhaite à personne."
        foregrounds: []
