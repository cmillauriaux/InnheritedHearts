      - uuid: "eau15dia6-seq1-4012-abcd-000000000006"
        character: "Lise"
        text: "Je ne peux pas dormir sans m'être lavée. C'est impossible. C'est comme si... comme si mon corps refusait de se mettre en veille sans avoir exécuté la routine complète."
        foregrounds: []
      - uuid: "eau15dia7-seq1-4012-abcd-000000000007"
        character: "Lise"
        text: "Pas de douche, pas de sommeil. Pas de sommeil, pas de concentration demain. C'est... c'est un effet domino que je ne peux pas me permettre."
        foregrounds: []
      - uuid: "eau15dia8-seq1-4012-abcd-000000000008"
