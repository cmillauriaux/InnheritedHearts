    dialogues:
      - uuid: "eau15dia1-seq1-4012-abcd-000000000001"
        character: "Joueur"
        text: "Bon... Avant que je prenne ma décision, est-ce que quelqu'un veut plaider sa cause ?"
        foregrounds: []
      - uuid: "eau15dia2-seq1-4012-abcd-000000000002"
        character: "Mary"
        text: "Moi ! S'il te plaît ! Demain matin, je dois présenter une œuvre devant un jury de professeurs. C'est ma note de fin de semestre !"
        foregrounds:
          - uuid: "e8c6d6df-14c8-4cb2-e436-a6f0e6161cc2"
            name: ""
            image: "assets/foregrounds/ai_1772880265_82487.png"
            z_order: 0
            opacity: 1.0
            flip_h: false
            flip_v: false
            scale: 0.67841193338778
            anchor_bg: { x: 1.40865862369537, y: 1.29869019985199 }
            anchor_fg: { x: 0.5, y: 1.0 }
            transition_type: "none"
            transition_duration: 0.5
      - uuid: "eau15dia3-seq1-4012-abcd-000000000003"
        character: "Mary"
        text: "Si j'arrive pas fraîche et présentable devant eux, ils vont me descendre. Ces profs-là, ils jugent tout : la posture, l'apparence, la confiance en soi..."
        foregrounds: []
      - uuid: "eau15dia4-seq1-4012-abcd-000000000004"
        character: "Mary"
        text: "Je ne peux pas me permettre de sentir le stress ET la transpiration. S'il vous plaît..."
        foregrounds: []
      - uuid: "eau15dia5-seq1-4012-abcd-000000000005"
        character: "Lise"
        text: "Je... Moi aussi j'en ai besoin. Je sais que ça peut paraître exagéré mais..."
        foregrounds:
          - uuid: "62cd1c7c-a5b0-498f-47f0-821ab5235454"
