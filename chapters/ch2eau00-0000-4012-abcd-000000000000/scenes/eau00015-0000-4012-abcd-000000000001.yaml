      - uuid: "eau15dia9-seq1-4012-abcd-000000000009"
        character: "Lola"
        text: "Je suis infirmière ! Enfin, future infirmière ! Demain je suis en stage à l'hôpital, au contact de patients immunodéprimés !"
        foregrounds: []
      - uuid: "eau15di10-seq1-4012-abcd-000000000010"
        character: "Lola"
        text: "Je ne peux PAS faire une croix sur une douche. C'est le B.A.-BA de l'hygiène hospitalière ! Si mes profs apprennent que je suis venue sans m'être lavée, je me fais recaler direct !"
        foregrounds: []
      - uuid: "eau15di11-seq1-4012-abcd-000000000011"
