      - uuid: "eau15dia0-seq0-4012-abcd-000000000002"
        character: "Mme Girard"
        text: "Il y a un vieux chauffe-eau de secours au sous sol. Il est petit, mais je pense qu'il reste assez d'eau chaude pour une douche. Une seule."
