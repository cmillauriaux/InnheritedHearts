        transition_duration: 0.5
    dialogues:
      - uuid: "ch3s3-dia1-seq3-abcd-000000000001"
        character: "Mme Girard"
        text: "En parlant de choses à régler... J'ai une autre tâche à vous confier. De la plus haute importance."
        foregrounds:
          - uuid: "ch3s3-fg1-seq3-abcd-000000000001"
            name: ""
            image: "assets/foregrounds/ai_1772623979_38078.png"
            z_order: 0
            opacity: 1.0
            flip_h: false
            flip_v: false
            scale: 0.7
            anchor_bg: { x: 0.5, y: 1.29999995231628 }
            anchor_fg: { x: 0.5, y: 1.0 }
            transition_type: "none"
            transition_duration: 0.5
      - uuid: "ch3s3-dia2-seq3-abcd-000000000002"
        character: "Joueur"
        text: "De la plus haute importance ? Qu'est-ce qui se passe ?"
        foregrounds: []
      - uuid: "ch3s3-dia3-seq3-abcd-000000000003"
        character: "Mme Girard"
        text: "Ce matin, en faisant ma tournée de la laverie, j'ai trouvé... quelque chose."
        foregrounds:
          - uuid: "ch3s3-fg2-seq3-abcd-000000000001"
            name: ""
            image: "assets/foregrounds/ai_1772623623_40153.png"
            z_order: 0
            opacity: 1.0
            flip_h: false
            flip_v: false
            scale: 0.7
            anchor_bg: { x: 0.5, y: 1.29999995231628 }
            anchor_fg: { x: 0.5, y: 1.0 }
            transition_type: "none"
            transition_duration: 0.5
      - uuid: "ch3s3-dia4-seq3-abcd-000000000004"
        character: "Joueur"
        text: "Quelque chose ? Quel genre de chose ?"
        foregrounds: []
      - uuid: "ch3s3-dia5-seq3-abcd-000000000005"
        character: "Mme Girard"
        text: "Quelque chose que je n'ose même pas nommer ! Un... un article vestimentaire des plus intimes !"
        foregrounds:
          - uuid: "ch3s3-fg3-seq3-abcd-000000000001"
            name: ""
            image: "assets/foregrounds/ai_1772623659_75175.png"
            z_order: 0
            opacity: 1.0
            flip_h: false
            flip_v: false
            scale: 0.7
            anchor_bg: { x: 0.5, y: 1.29999995231628 }
            anchor_fg: { x: 0.5, y: 1.0 }
            transition_type: "none"
            transition_duration: 0.5
      - uuid: "ch3s3-dia6-seq3-abcd-000000000006"
        character: "Joueur"
        text: "Un article vestimentaire des plus... Oh."
        foregrounds: []
      - uuid: "ch3s3-dia7-seq3-abcd-000000000007"
        character: "Mme Girard"
        text: "Je l'ai déposé sur votre bureau. Vous comprendrez en le voyant."
        foregrounds:
          - uuid: "ch3s3-fg4-seq3-abcd-000000000001"
            name: ""
            image: "assets/foregrounds/ai_1772623434_06199.png"
            z_order: 0
            opacity: 1.0
            flip_h: false
            flip_v: false
            scale: 0.7
            anchor_bg: { x: 0.5, y: 1.29999995231628 }
            anchor_fg: { x: 0.5, y: 1.0 }
            transition_type: "none"
            transition_duration: 0.5
      - uuid: "ch3s3-dia8-seq3-abcd-000000000008"
        character: "Mme Girard"
        text: "Ce n'est PAS dans mon auberge qu'on laisse traîner ce genre de choses ! Je suis la gardienne et la garante des bonnes mœurs de cet établissement !"
        foregrounds:
          - uuid: "ch3s3-fg5-seq3-abcd-000000000001"
            name: ""
            image: "assets/foregrounds/ai_1772623659_75175.png"
            z_order: 0
            opacity: 1.0
            flip_h: false
            flip_v: false
            scale: 0.7
            anchor_bg: { x: 0.5, y: 1.29999995231628 }
            anchor_fg: { x: 0.5, y: 1.0 }
            transition_type: "none"
            transition_duration: 0.5
      - uuid: "ch3s3-dia9-seq3-abcd-000000000009"
        character: "Mme Girard"
        text: "Votre mission : trouver à qui ça appartient, lui rendre, et lui dire de ne plus JAMAIS laisser traîner ses affaires !"
        foregrounds:
          - uuid: "ch3s3-fg6-seq3-abcd-000000000001"
            name: ""
            image: "assets/foregrounds/ai_1772623979_38078.png"
            z_order: 0
            opacity: 1.0
            flip_h: false
            flip_v: false
            scale: 0.7
            anchor_bg: { x: 0.5, y: 1.29999995231628 }
            anchor_fg: { x: 0.5, y: 1.0 }
            transition_type: "none"
            transition_duration: 0.5
      - uuid: "ch3s3-dia10-seq3-abcd-000000000010"
        character: "Mme Girard"
        text: "Les filles sont en cours. Vous avez jusqu'à leur retour. Je compte sur vous."
        foregrounds:
          - uuid: "ch3s3-fg7-seq3-abcd-000000000001"
            name: ""
            image: "assets/foregrounds/ai_1772623831_00079.png"
            z_order: 0
