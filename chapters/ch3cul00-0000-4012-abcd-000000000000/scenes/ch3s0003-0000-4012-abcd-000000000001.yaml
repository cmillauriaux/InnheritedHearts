    dialogues:
      - uuid: "ch3s3-dia1-seq2-abcd-000000000001"
        character: "Mme Girard"
        text: "Tiens, tiens ! Le jeune propriétaire qui rentre de sa promenade matinale. Où étiez-vous passé ?"
        foregrounds:
          - uuid: "ch3s3-fg1-seq2-abcd-000000000001"
            name: ""
            image: "assets/foregrounds/ai_1772623623_40153.png"
            z_order: 0
            opacity: 1.0
            flip_h: false
            flip_v: false
            scale: 0.7
            anchor_bg: { x: 0.5, y: 1.29999995231628 }
            anchor_fg: { x: 0.5, y: 1.0 }
            transition_type: "none"
            transition_duration: 0.5
      - uuid: "ch3s3-dia2-seq2-abcd-000000000002"
        character: "Joueur"
        text: "En ville, Mme Girard. J'ai trouvé un réparateur pour le chauffe-eau !"
        foregrounds: []
      - uuid: "ch3s3-dia3-seq2-abcd-000000000003"
        character: "Joueur"
        text: "Il passe cet après-midi avec un ballon d'occasion. On aura de l'eau chaude ce soir !"
        foregrounds: []
      - uuid: "ch3s3-dia4-seq2-abcd-000000000004"
        character: "Mme Girard"
        text: "Eh bien ! Voilà qui est efficace. Le vieux Alfred aurait été fier de vous, mon garçon."
        foregrounds:
          - uuid: "ch3s3-fg2-seq2-abcd-000000000001"
            name: ""
            image: "assets/foregrounds/ai_1772623831_00079.png"
            z_order: 0
            opacity: 1.0
            flip_h: false
            flip_v: false
            scale: 0.7
            anchor_bg: { x: 0.5, y: 1.29999995231628 }
            anchor_fg: { x: 0.5, y: 1.0 }
            transition_type: "none"
            transition_duration: 0.5
      - uuid: "ch3s3-dia5-seq2-abcd-000000000005"
        character: "Joueur"
        text: "Merci, ça fait plaisir à entendre. C'est M. Durand qui s'en occupe. Il vous passe le bonjour d'ailleurs."
        foregrounds: []
      - uuid: "ch3s3-dia6-seq2-abcd-000000000006"
        character: "Mme Girard"
        text: "Le petit Durand ! Ah, c'est un brave homme. Son père tenait déjà la boutique avant lui."
        foregrounds:
          - uuid: "ch3s3-fg3-seq2-abcd-000000000001"
            name: ""
