        character: "Joueur"
        text: "Oui, je m'en doute... Et c'est justement le problème. Je n'ai pas vraiment les moyens d'en acheter un neuf."
        foregrounds: []
      - uuid: "ch3s2-dia7-seq2-abcd-000000000007"
