        text: "Attends... C'est quoi ça dans le tiroir du bureau ? Un... couteau ? Taché de rouge ?!"
        foregrounds: []
      - uuid: "ch3s5-dia5-alic-abcd-000000000005"
        character: "Joueur"
        text: "OK. Un couteau taché de rouge dans la chambre de l'étudiante en criminologie. Tout est parfaitement normal. Absolument rien d'inquiétant."
        foregrounds: []
      - uuid: "ch3s5-dia6-alic-abcd-000000000006"
