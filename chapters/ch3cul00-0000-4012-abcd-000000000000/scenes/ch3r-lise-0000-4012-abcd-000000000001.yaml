      - uuid: "ch3s5-dia1-lise-abcd-000000000001"
        character: "Joueur"
        text: "La chambre de Lise. Impeccable, comme on pouvait s'y attendre. Tout est rangé au millimètre."
        foregrounds: []
      - uuid: "ch3s5-dia2-lise-abcd-000000000002"
        character: "Joueur"
        text: "Figurines de manga alignées par taille, écrans d'ordinateur parfaitement parallèles, câbles organisés avec des serre-câbles."
        foregrounds: []
      - uuid: "ch3s5-dia3-lise-abcd-000000000003"
        character: "Joueur"
        text: "Son tiroir est fermé. Sous le lit, pas un grain de poussière. Cette fille est un robot."
        foregrounds: []
      - uuid: "ch3s5-dia4-lise-abcd-000000000004"
        character: "Joueur"
        text: "Tiens... Sur le bureau, un petit carnet avec un cadenas. \"Journal de Lise - PRIVÉ\" écrit en rouge."
        foregrounds:
