        transition_duration: 0.5
    dialogues:
      - uuid: "ch3s5-dia1-liseJ-abcd-000000000001"
        character: "Joueur"
        text: "Le cadenas est ouvert... Elle a oublié de le fermer. Bon, juste un coup d'œil rapide..."
        foregrounds:
          - uuid: "9c8cabf9-aaef-4f76-7303-50830ce4e011"
            name: ""
            image: "assets/foregrounds/ai_1772974616_64723.png"
            z_order: 0
            opacity: 1.0
            flip_h: false
            flip_v: false
            scale: 1.0
            anchor_bg: { x: 0.79609507322311, y: 1.29769814014435 }
            anchor_fg: { x: 0.5, y: 1.0 }
            transition_type: "none"
            transition_duration: 0.5
      - uuid: "ch3s5-dia2-liseJ-abcd-000000000002"
        character: "Joueur"
        text: "\"Cher journal, le nouveau propriétaire est arrivé aujourd'hui. Il a l'air gentil mais un peu perdu. Comme un personnage de visual novel qui ne sait pas encore quel route il va prendre.\""
        foregrounds: []
      - uuid: "ch3s5-dia3-liseJ-abcd-000000000003"
        character: "Joueur"
        text: "Elle parle de moi ?! Et... un personnage de visual novel ? C'est comme ça qu'elle me voit ?"
        foregrounds: []
      - uuid: "ch3s5-dia4-liseJ-abcd-000000000004"
        character: "Joueur"
        text: "\"D'ailleurs, je devrais utiliser cette situation pour mon propre jeu. Un VN dans une auberge, avec un protagoniste maladroit entouré de filles...\""
        foregrounds: []
      - uuid: "ch3s5-dia5-liseJ-abcd-000000000005"
        character: "Joueur"
        text: "Elle... elle écrit un jeu de visual novel ? Basé sur... nous ?!"
        foregrounds: []
      - uuid: "ch3s5-dia6-liseJ-abcd-000000000006"
        character: "Joueur"
        text: "OK, j'en ai assez lu. Je me sens déjà assez coupable comme ça."
        foregrounds: []
    fx: []
