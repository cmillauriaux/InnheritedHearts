      - uuid: "ch3s4-dia3-seq1-abcd-000000000003"
        character: "Joueur"
        text: "Blanche, propre, fraîchement lavée apparemment. Posée là, sur mon bureau, comme si c'était la chose la plus normale du monde."
        foregrounds: []
      - uuid: "ch3s4-dia4-seq1-abcd-000000000004"
