        foregrounds: []
      - uuid: "ch3s4-dia2-seq3-abcd-000000000002"
        character: "Joueur"
        text: "Mais il faut quand même que je trouve à qui elle appartient... Mme Girard ne me lâchera pas tant que ce ne sera pas résolu."
        foregrounds: []
      - uuid: "ch3s4-dia3-seq3-abcd-000000000003"
        character: "Joueur"
        text: "Les filles sont en cours. Peut-être que je devrais jeter un œil dans leurs chambres pour trouver un indice ?"
        foregrounds: []
      - uuid: "ch3s4-dia4-seq3-abcd-000000000004"
