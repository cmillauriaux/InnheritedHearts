  - uuid: "ch3s4-seq2-4012-abcd-000000000002"
    name: "Inspection minutieuse"
    title: ""
    subtitle: ""
    position: { x: 620.0, y: 260.0 }
    background: "assets/backgrounds/Background_player_bedroom.jpeg"
    background_color: "00000000"
    foregrounds: []
    dialogues:
      - uuid: "ch3s4-dia1-seq2-abcd-000000000001"
        character: "Joueur"
        text: "Bon... Analysons les indices. Si Alicia était là, elle appellerait ça une 'pièce à conviction'."
        foregrounds: []
      - uuid: "ch3s4-dia2-seq2-abcd-000000000002"
        character: "Joueur"
        text: "Blanche, taille standard, un petit nœud sur le devant. Pas de marque visible. Aucune inscription."
        foregrounds: []
      - uuid: "ch3s4-dia3-seq2-abcd-000000000003"
        character: "Joueur"
        text: "Ça pourrait être à n'importe qui. Fantastique."
        foregrounds: []
      - uuid: "ch3s4-dia4-seq2-abcd-000000000004"
        character: "Joueur"
        text: "Les filles sont en cours... Leurs chambres sont vides. Si je veux des indices, c'est maintenant ou jamais."
        foregrounds: []
      - uuid: "ch3s4-dia5-seq2-abcd-000000000005"
        character: "Joueur"
        text: "Je sais que fouiller leurs chambres c'est mal. Très mal, même. Mais Mme Girard m'a confié une mission."
        foregrounds: []
      - uuid: "ch3s4-dia6-seq2-abcd-000000000006"
        character: "Joueur"
        text: "Peut-être qu'en jetant un rapide coup d'œil, je trouverai un indice sur la propriétaire de cette... pièce à conviction."
        foregrounds: []
    fx: []
