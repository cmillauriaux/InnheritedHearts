      - uuid: "ch3s5-dia1-mary-abcd-000000000001"
        character: "Joueur"
        text: "La chambre de Mary... Toujours aussi bordélique. On dirait qu'un ouragan créatif est passé par là."
        foregrounds: []
      - uuid: "ch3s5-dia2-mary-abcd-000000000002"
        character: "Joueur"
        text: "Des pinceaux partout, des toiles en cours, des tubes de peinture ouverts... Comment elle retrouve quoi que ce soit là-dedans ?"
        foregrounds: []
      - uuid: "ch3s5-dia3-mary-abcd-000000000003"
        character: "Joueur"
        text: "Voyons voir... Le tiroir à sous-vêtements ? Non, je ne vais pas fouiller là-dedans. Pas encore."
        foregrounds: []
      - uuid: "ch3s5-dia4-mary-abcd-000000000004"
        character: "Joueur"
        text: "Sous le lit ? Des chaussettes sales et un vieux sandwich. Beurk."
        foregrounds: []
      - uuid: "ch3s5-dia5-mary-abcd-000000000005"
        character: "Joueur"
        text: "Sur le bureau... Tiens, un flyer. \"Exposition d'art contemporain - Natures mortes revisitées\". C'est l'expo de Mary ?"
        foregrounds:
          - uuid: "c196bd8a-cbe9-4ac4-5d1c-8c2fb11378fc"
