            transition_duration: 0.5
      - uuid: "ch3s6-dia8-mary-abcd-000000000008"
        character: "Joueur"
        text: "Un modèle ? Euh... On verra ! Mais en fait, je suis venu te poser une question."
        foregrounds: []
      - uuid: "ch3s6-dia9-mary-abcd-000000000009"
