            transition_type: "none"
            transition_duration: 0.5
      - uuid: "ch3s6-dia4-mary-abcd-000000000004"
        character: "Joueur"
        text: "C'est... c'est un chaos organisé, en fait ?"
        foregrounds: []
      - uuid: "ch3s6-dia5-mary-abcd-000000000005"
        character: "Mary"
        text: "Exactement ! Alors ne refais plus jamais ça, d'accord ? Un artiste a besoin de son espace sacré."
        foregrounds:
          - uuid: "ch3s6-fg3-mary-abcd-000000000001"
            name: ""
            image: "assets/foregrounds/ai_1772402795_41806.png"
            z_order: 0
