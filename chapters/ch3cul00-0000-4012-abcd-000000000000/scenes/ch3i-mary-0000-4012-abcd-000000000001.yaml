            transition_duration: 0.5
      - uuid: "ch3s6-dia2-mary-abcd-000000000002"
        character: "Joueur"
        text: "Ah bon ? Qu... Comment tu le sais ?"
        foregrounds: []
      - uuid: "ch3s6-dia3-mary-abcd-000000000003"
        character: "Mary"
        text: "Mon tube de bleu de Prusse a bougé de trois centimètres. Je sais, mon bazar a l'air aléatoire, mais moi je sais exactement où chaque chose se trouve."
        foregrounds:
          - uuid: "ch3s6-fg2-mary-abcd-000000000001"
            name: ""
