            flip_v: false
            scale: 0.7
            anchor_bg: { x: 0.5, y: 1.29999995231628 }
            anchor_fg: { x: 0.5, y: 1.0 }
            transition_type: "none"
            transition_duration: 0.5
      - uuid: "ch3s6-dia7-mary-abcd-000000000007"
        character: "Mary"
        text: "Tu viendras, hein ? J'ai besoin de public ! Et j'aurais peut-être besoin d'un modèle aussi..."
        foregrounds:
          - uuid: "ch3s6-fg5-mary-abcd-000000000001"
