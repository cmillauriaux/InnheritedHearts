            transition_type: "none"
            transition_duration: 0.5
      - uuid: "ch3s6-dia6-mary-abcd-000000000006"
        character: "Mary"
        text: "D'ailleurs, puisque tu es là... Tu as vu le flyer sur mon bureau ? J'ai une expo la semaine prochaine ! Natures mortes revisitées !"
        foregrounds:
          - uuid: "ch3s6-fg4-mary-abcd-000000000001"
