      - uuid: "ch3s6-dia1-mary-abcd-000000000001"
        character: "Mary"
        text: "Oh, c'est toi ! Entre, entre ! Tu sais que quelqu'un est entré dans ma chambre aujourd'hui ?"
        foregrounds:
