        text: "Bon. Récapitulons. J'ai trouvé un flyer d'expo chez Mary, un journal intime chez Lise, des gants de boxe chez Lola, un couteau taché de rouge chez Alicia et un masque tribal chez Zven."
        foregrounds: []
      - uuid: "ch3s5-dia2-bilan-abcd-000000000002"
        character: "Joueur"
        text: "Mais strictement AUCUN indice sur la propriétaire de la petite culotte. Zéro. Nada."
        foregrounds: []
      - uuid: "ch3s5-dia3-bilan-abcd-000000000003"
