    background_color: "00000000"
    foregrounds:
      - uuid: "ch3s5-fg1-gir-abcd-000000000001"
        name: ""
        image: "assets/foregrounds/ai_1772623659_75175.png"
        z_order: 0
        opacity: 1.0
        flip_h: false
        flip_v: false
        scale: 0.7
        anchor_bg: { x: 0.5, y: 1.29999995231628 }
        anchor_fg: { x: 0.5, y: 1.0 }
        transition_type: "none"
        transition_duration: 0.5
    dialogues:
      - uuid: "ch3s5-dia1-gir-abcd-000000000001"
        character: "Mme Girard"
        text: "Alors ?! Vous avez trouvé quelque chose ?"
        foregrounds:
          - uuid: "ch3s5-fg1-gir-abcd-000000000001"
            name: ""
            image: "assets/foregrounds/ai_1772623659_75175.png"
            z_order: 0
            opacity: 1.0
            flip_h: false
            flip_v: false
            scale: 0.7
            anchor_bg: { x: 0.5, y: 1.29999995231628 }
            anchor_fg: { x: 0.5, y: 1.0 }
            transition_type: "none"
            transition_duration: 0.5
      - uuid: "ch3s5-dia2-gir-abcd-000000000002"
        character: "Joueur"
        text: "Euh... Pas vraiment, non. J'ai inspecté les chambres mais..."
        foregrounds: []
      - uuid: "ch3s5-dia3-gir-abcd-000000000003"
        character: "Mme Girard"
        text: "Les chambres ?! Vous avez fouillé les chambres des filles ?!"
        foregrounds:
          - uuid: "ch3s5-fg2-gir-abcd-000000000001"
            name: ""
            image: "assets/foregrounds/ai_1772623659_75175.png"
            z_order: 0
            opacity: 1.0
            flip_h: false
            flip_v: false
            scale: 0.7
            anchor_bg: { x: 0.5, y: 1.29999995231628 }
            anchor_fg: { x: 0.5, y: 1.0 }
            transition_type: "none"
            transition_duration: 0.5
      - uuid: "ch3s5-dia4-gir-abcd-000000000004"
        character: "Joueur"
        text: "C'était pour l'enquête ! Vous m'avez dit de trouver la propriétaire !"
        foregrounds: []
      - uuid: "ch3s5-dia5-gir-abcd-000000000005"
        character: "Mme Girard"
        text: "Hmph. Passons. Les filles viennent de rentrer de cours. Elles font leurs devoirs dans leurs chambres."
        foregrounds:
          - uuid: "ch3s5-fg3-gir-abcd-000000000001"
            name: ""
            image: "assets/foregrounds/ai_1772623979_38078.png"
            z_order: 0
            opacity: 1.0
            flip_h: false
            flip_v: false
            scale: 0.7
            anchor_bg: { x: 0.5, y: 1.29999995231628 }
            anchor_fg: { x: 0.5, y: 1.0 }
            transition_type: "none"
            transition_duration: 0.5
      - uuid: "ch3s5-dia6-gir-abcd-000000000006"
        character: "Mme Girard"
        text: "Profitez-en pour les interroger. En douceur. Et trouvez-moi cette coupable !"
        foregrounds:
          - uuid: "ch3s5-fg4-gir-abcd-000000000001"
            name: ""
            image: "assets/foregrounds/ai_1772623434_06199.png"
            z_order: 0
            opacity: 1.0
            flip_h: false
            flip_v: false
            scale: 0.7
            anchor_bg: { x: 0.5, y: 1.29999995231628 }
            anchor_fg: { x: 0.5, y: 1.0 }
            transition_type: "none"
            transition_duration: 0.5
      - uuid: "ch3s5-dia7-gir-abcd-000000000007"
        character: "Joueur"
        text: "Aller interroger cinq filles sur une petite culotte... après avoir fouillé leurs chambres. Qu'est-ce qui pourrait mal tourner ?"
        foregrounds: []
