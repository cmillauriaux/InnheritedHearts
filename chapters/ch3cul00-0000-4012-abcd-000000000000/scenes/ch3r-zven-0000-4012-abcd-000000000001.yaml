        character: "Joueur"
        text: "La chambre de Zven. Colorée, pleine de souvenirs de son île. Des coquillages sur l'étagère, des tissus bariolés aux murs."
        foregrounds: []
      - uuid: "ch3s5-dia2-zven-abcd-000000000002"
        character: "Joueur"
        text: "Son tiroir est un joyeux mélange de vêtements locaux et de vêtements d'ici. Rien de particulier."
        foregrounds: []
      - uuid: "ch3s5-dia3-zven-abcd-000000000003"
        character: "Joueur"
        text: "Sous le lit, des cartes postales de son île. Touchant."
        foregrounds: []
      - uuid: "ch3s5-dia4-zven-abcd-000000000004"
        character: "Joueur"
        text: "Et sur le mur... Un masque en bois. Sculpté à la main, avec des motifs tribaux. Il a l'air ancien et sacré."
        foregrounds:
          - uuid: "345954ef-4967-49f3-be2a-56623324b27c"
