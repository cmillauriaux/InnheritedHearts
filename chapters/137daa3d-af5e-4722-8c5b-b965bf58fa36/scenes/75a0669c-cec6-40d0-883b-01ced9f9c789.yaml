      - uuid: "48c85b5c-7733-4f73-8a4b-8f5c548c6345"
        character: "Joueur"
        text: "Je n'ai jamais tenu d'auberge de ma vie. Et une pension pour jeunes femmes en plus... Je ne suis vraiment pas doué avec les filles."
        foregrounds: []
      - uuid: "92eddf01-7ae8-4a48-a950-c051aaed7902"
        character: "Joueur"
        text: "Et comment je suis censé aider des étudiantes, moi ? J'ai foiré mes études. Deux fois. Oncle Alfred, tu es sûr de toi ?"
        foregrounds: []
