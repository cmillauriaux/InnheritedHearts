            transition_duration: 0.5
      - uuid: "ff0c4556-748a-45b8-8d8b-dceed3954bff"
        character: "Joueur"
        text: "Lise l'informaticienne... tellement mignonne et tellement timide. Elle a failli pas m'ouvrir la porte. Geek jusqu'au bout des ongles."
