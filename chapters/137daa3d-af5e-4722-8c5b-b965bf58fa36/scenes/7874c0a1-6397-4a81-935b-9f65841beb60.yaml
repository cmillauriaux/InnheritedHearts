      - uuid: "7f9a80a3-c764-42fa-937a-39bf1971b39e"
        character: "Maître Dumont"
        text: "Bonjour. Je suis Maître Dumont. Je vous remercie d'avoir répondu à notre convocation si promptement."
        foregrounds:
          - uuid: "dba2df17-bdd1-4c78-ce83-172f7046f87e"
            name: ""
            image: "/Users/cedric/Stories/InnheritedHearts/assets/foregrounds/ai_1772389917_08433.png"
            z_order: 0
            opacity: 1.0
            flip_h: false
            flip_v: false
            scale: 0.90967743450004
            anchor_bg: { x: 0.82393896579742, y: 1.2986900806427 }
            anchor_fg: { x: 0.5, y: 1.0 }
            transition_type: "fade"
            transition_duration: 1.0
      - uuid: "cc685661-9118-42b1-a418-043369f04ca0"
        character: "Maître Dumont"
        text: "Je dois vous informer que vous êtes le seul héritier désigné par votre oncle Alfred."
        foregrounds: []
      - uuid: "9be73074-9bc3-4f2e-8ccb-8b979b793be4"
        character: "Maître Dumont"
        text: "Votre oncle était un homme de convictions. Il a choisi de léguer l'intégralité de sa fortune à plusieurs associations caritatives."
        foregrounds:
          - uuid: "c6bc682e-6fd3-4448-5444-64c555ba9e2e"
            name: ""
            image: "/Users/cedric/Stories/InnheritedHearts/assets/foregrounds/ai_1772389973_03395.png"
            z_order: 0
            opacity: 1.0
            flip_h: false
            flip_v: false
            scale: 0.90967743450004
            anchor_bg: { x: 0.82393896579742, y: 1.2986900806427 }
            anchor_fg: { x: 0.5, y: 1.0 }
            transition_type: "fade"
            transition_duration: 1.0
      - uuid: "c7f357ad-ae96-4f55-8a40-728f6edf1eab"
        character: "Maître Dumont"
        text: "Sa voiture, quant à elle, revient à Madame Girard, sa concierge, qui prenait soin de lui depuis de nombreuses années."
        foregrounds: []
      - uuid: "bd02f076-ac18-442b-bdd3-dddc56b5c63a"
        character: "Maître Dumont"
        text: "En revanche, votre oncle vous lègue son auberge. Une pension qu'il avait fondée pour accueillir des jeunes femmes poursuivant leurs études."
        foregrounds:
          - uuid: "74111ee2-4d71-4c7a-6f4d-6193aafff418"
            name: ""
            image: "/Users/cedric/Stories/InnheritedHearts/assets/foregrounds/ai_1772390303_69232.png"
            z_order: 0
            opacity: 1.0
            flip_h: false
            flip_v: false
            scale: 0.90967743450004
            anchor_bg: { x: 0.82393896579742, y: 1.2986900806427 }
            anchor_fg: { x: 0.5, y: 1.0 }
            transition_type: "fade"
            transition_duration: 0.5
      - uuid: "5d338921-8b40-409c-87fd-d056ce19db76"
        character: "Maître Dumont"
        text: "Plusieurs résidentes y vivent en ce moment même. Des étudiantes, pour la plupart."
        foregrounds: []
      - uuid: "9fd82d8b-322e-4ac8-ba0b-fb99b289e456"
        character: "Maître Dumont"
        text: "La condition est formelle : vous devez vous engager à ne renvoyer aucune résidente et à laisser chacune d'elles terminer ses études avant de disposer du bien comme bon vous semble."
        foregrounds:
          - uuid: "49fb6c9d-d4eb-4bab-d1b6-f08d6db3d2de"
            name: ""
            image: "/Users/cedric/Stories/InnheritedHearts/assets/foregrounds/ai_1772390350_70862.png"
            z_order: 0
            opacity: 1.0
            flip_h: false
            flip_v: false
            scale: 0.90967743450004
            anchor_bg: { x: 0.82393896579742, y: 1.2986900806427 }
            anchor_fg: { x: 0.5, y: 1.0 }
            transition_type: "fade"
            transition_duration: 1.0
