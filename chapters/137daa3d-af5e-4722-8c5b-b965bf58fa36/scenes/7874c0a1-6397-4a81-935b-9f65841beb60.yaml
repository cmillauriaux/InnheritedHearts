    dialogues:
      - uuid: "7f9a80a3-c764-42fa-937a-39bf1971b39e"
        character: "Maître Dumont"
        text: "Bonjour. Je suis Maître Dumont. Je vous remercie d'avoir répondu à notre convocation si promptement."
        foregrounds: []
      - uuid: "cc685661-9118-42b1-a418-043369f04ca0"
        character: "Maître Dumont"
        text: "Je dois vous informer que vous êtes le seul héritier désigné par votre oncle Alfred."
