        character: "Joueur"
        text: "Je me demande vraiment ce que mon vieil oncle Alfred a bien pu me léguer..."
        foregrounds: []
      - uuid: "16dfca9f-4f5b-4aa5-893a-a7a431a8f320"
        character: "Joueur"
        text: "Nous ne nous sommes pas vus depuis des années. Je savais qu'il était professeur à la fac, mais c'est à peu près tout ce que je sais de lui."
        foregrounds: []
      - uuid: "85b2f902-39b2-4b80-94ce-edb34a6eca49"
        character: "Joueur"
        text: "Drôle d'homme, cet oncle Alfred. Discret, effacé... et pourtant, il a pensé à moi."
