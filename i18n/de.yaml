Chapitre 1: ""
Un héritage inattendu: ""
Monologue sur l'oncle Alfred: ""
Joueur: ""
Je me demande vraiment ce que mon vieil oncle Alfred a bien pu me léguer...: ""
Nous ne nous sommes pas vus depuis des années. Je savais qu'il était professeur à la fac, mais c'est à peu près tout ce que je sais de lui.: ""
Drôle d'homme, cet oncle Alfred. Discret, effacé... et pourtant, il a pensé à moi.: ""
Devant le cabinet du notaire: ""
Appréhension du notaire: ""
Voilà, c'est bien ça. Le cabinet du notaire. Maître Dumont... L'enseigne est bien là.: ""
Je n'aime vraiment pas les notaires. J'ai toujours l'impression de ne rien comprendre à ce qu'ils me disent, et de me faire plumer sans m'en rendre compte.: ""
Le bureau de Maître Dumont: ""
Entretien chez le notaire: ""
Maître Dumont: ""
Bonjour. Je suis Maître Dumont. Je vous remercie d'avoir répondu à notre convocation si promptement.: ""
Je dois vous informer que vous êtes le seul héritier désigné par votre oncle Alfred.: ""
Votre oncle était un homme de convictions. Il a choisi de léguer l'intégralité de sa fortune à plusieurs associations caritatives.: ""
Sa voiture, quant à elle, revient à Madame Girard, sa concierge, qui prenait soin de lui depuis de nombreuses années.: ""
En revanche, votre oncle vous lègue son auberge. Une pension qu'il avait fondée pour accueillir des jeunes femmes poursuivant leurs études.: ""
Plusieurs résidentes y vivent en ce moment même. Des étudiantes, pour la plupart.: ""
La condition est formelle : vous devez vous engager à ne renvoyer aucune résidente et à laisser chacune d'elles terminer ses études avant de disposer du bien comme bon vous semble.: ""
Accepter l'offre: ""
Refuser l'offre: ""
Remise des clés: ""
Très bien. Voici les clés de l'auberge. Votre oncle aurait été heureux de savoir que vous honorez sa volonté.: ""
Je vous souhaite bon courage. Ce n'est pas une mince affaire, mais je suis sûr que vous saurez vous en sortir.: ""
Sur la route de l'auberge: ""
Monologue dans la campagne: ""
Une auberge. Mon oncle me lègue une auberge. Quel coup tordu il me joue, même depuis sa tombe...: ""
Je n'ai jamais tenu d'auberge de ma vie. Et une pension pour jeunes femmes en plus... Je ne suis vraiment pas doué avec les filles.: ""
Et comment je suis censé aider des étudiantes, moi ? J'ai foiré mes études. Deux fois. Oncle Alfred, tu es sûr de toi ?: ""
Devant l'auberge: ""
Voilà... c'est bien ça. Une grande bâtisse en pierre, entourée de verdure, avec une enseigne en bois. Exactement comme Maître Dumont l'avait décrite.: ""
Rencontre avec Mme Girard: ""
Mme Girard: ""
On n'a besoin de rien, merci. Et les commerciaux dans votre genre ne sont pas très bien vus dans le coin.: ""
Je ne suis pas commercial. Je suis le nouveau propriétaire.: ""
Pardon, je me suis trompé d'adresse.: ""
Le fou rire de Mme Girard: ""
Ha ! Le nouveau propriétaire ! Permettez-moi d'en douter. M. Alfred est un homme charmant, cultivé, distingué. Pas un gamin à l'air paumé dans votre genre !: ""
Tu sais ce qu'il te dit le gamin, vieille bique ?: ""
C'est mon oncle. Il est malheureusement décédé.: ""
Accrochage avec Mme Girard: ""
Vieille bique ?! Surveille ton langage, mon petit !: ""
Si mon oncle n'était pas décédé, je l'appellerais sur le champ.: ""
La nouvelle du décès: ""
Décédé... ? Alfred est mort ?: ""
Oui. Il a tout légué à des associations caritatives. Mais il vous a laissé sa voiture.: ""
Sa voiture... Il pensait encore à moi. Ce cher homme.: ""
Bon... Suivez-moi. Je vais vous montrer votre chambre.: ""
La chambre du propriétaire: ""
Visite de la chambre: ""
C'est... très silencieux ici. Je m'attendais à plus d'animation.: ""
Les filles sont toutes en cours à cette heure-ci. En journée, c'est moi qui m'occupe de tout.: ""
La chambre est très... simple.: ""
Votre oncle était d'une générosité sans pareille, mais il vivait très simplement lui-même. C'était sa chambre.: ""
Installez-vous. Ce soir, quand les résidentes rentrent des cours, ce sera une bonne chose de vous présenter à elles.: ""
Exploration de l'auberge: ""
Seul dans la chambre: ""
Bon... Qu'est-ce que je fais maintenant ? Mme Girard a l'air de tenir cet endroit d'une main de fer. Elle n'a visiblement pas besoin de moi.: ""
Autant en profiter pour visiter les lieux. Je suis le propriétaire après tout, non ?: ""
Par où commencer ?: ""
Je commence par où ?: ""
La salle à manger: ""
La salle de bain: ""
Le sous-sol: ""
Petite, mais cosy. Les tables en bois, les chaises dépareillées... il y a quelque chose de chaleureux ici.: ""
Ça doit être animé quand tout le monde est là. Du mal à imaginer ça pour l'instant.: ""
Une seule salle de bain... pour une auberge de filles. Le matin doit être un enfer. Je plains déjà la dernière levée.: ""
Sombre, humide, et j'ai juré avoir entendu quelque chose bouger dans le fond. J'espère vraiment ne plus jamais avoir à redescendre ici.: ""
Retour dans la chambre: ""
Un bruit dans le couloir: ""
Tiens, j'ai cru entendre du bruit ! Je vais aller voir.: ""
Mme Girard annonce le retour des pensionnaires: ""
Ah, vous voilà ! Les pensionnaires sont rentrées. Il va falloir aller vous présenter.: ""
Ok... allons-y.: ""
En ce moment, il y a cinq pensionnaires : Mary, Lise, Lola, Alicia et Zven.: ""
Rencontrer les pensionnaires: ""
Qui veux-tu aller rencontrer ?: ""
Bon, par qui je commence ?: ""
Mary: ""
Lise: ""
Lola: ""
Alicia: ""
Zven: ""
Devant la porte close: ""
Chambre 3... C'est ici. Je me demande à quoi elle ressemble et ce qu'elle étudie...: ""
La porte s'ouvre: ""
Oh... Bonjour ! Euh... Je n'ai rien commandé à manger pourtant...: ""
Quoi ?! Elle me prend pour un livreur de pizza ?!: ""
Non, non pas du tout, je suis le nouveau propriétaire.: ""
Je suis pas livreur ! Je suis ton nouveau propriétaire !: ""
Mary s'excuse: ""
Oh ! Pardon, pardon... Je suis un peu dans la lune en ce moment. Je travaille sur un projet de sculpture pour l'école.: ""
Ah tu fais une école d'art ?: ""
Elle est un peu en bazar ta chambre nan ?: ""
L'artiste de l'auberge: ""
Tu es observateur ! Oui, je suis l'artiste de l'auberge. Je fais des études de beaux arts. J'espère un jour être une grande peintre, capturer l'essence de mon époque et de ma génération... Mais pour le moment, je suis surtout une étudiante fauchée, un peu paumée. Je remercie ton oncle d'avoir bien voulu me donner cette chambre. Sans lui, je serais certainement retournée faire du service en restauration toute ma vie.: ""
La piètre ménagère: ""
Ha ha ! Oui... Je passe beaucoup de temps à structurer et imaginer dans ma tête, mais très peu dans le monde réel. Je suis une artiste avant tout. Et une piètre ménagère, c'est vrai !: ""
Au revoir Mary: ""
En tout cas, je suis contente d'avoir rencontré le nouveau proprio ! J'espère que tu seras aussi gentil que ton oncle.: ""
La porte se referme: ""
Mary est vraiment mignonne... Mais elle a l'air vraiment dans son monde. Et vraiment bordélique.: ""
Devant la porte de Lise: ""
Chambre 4... Je me demande à quoi elle ressemble et ce qu'elle étudie.: ""
Lise ouvre la porte: ""
Euh... Oui ? Je... En fait, je peux faire quelque chose pour vous ?: ""
Je suis le nouveau propriétaire.: ""
Elle est super kawaï ta chambre !: ""
Nouveau propriétaire: ""
Oh... Le nouveau propriétaire. C'est... Euh... C'est inattendu. Je vais devoir m'habituer... Mais ça va me prendre du temps.: ""
La chambre kawaï: ""
Euh... Merci. Je... En fait, je m'inspire des mangas que je lis. Je n'ai pas vraiment beaucoup de personnalité, alors je reproduis ce que je vois dans mes bouquins.: ""
Ha ha ! Je suis le nouveau propriétaire, et je peux te dire que c'est la plus belle chambre que j'ai vue jusqu'à maintenant !: ""
Oh... Euh... Merci beaucoup.: ""
Qu'est-ce que tu fais ?: ""
Euh... Voilà voilà.: ""
Tu fais quoi comme études ?: ""
Tu fais quoi dans la vie ?: ""
Lise la geek: ""
J'étudie l'informatique. Je suis... Enfin, je suis une geek, passionnée par les ordinateurs et les mangas. Je ne sors pas beaucoup, je ne pose pas de problème, je suis pas très exigeante... Mais la connexion internet, par contre, il faut pas y toucher.: ""
Lise est vraiment mignonne... Mais vraiment timide.: ""
Devant la porte de Lola: ""
Porte 1... Lola. C'est marrant, j'avais une copine qui s'appelait Lola quand j'étais petit. Je me demande si elles se ressemblent.: ""
Lola ouvre la porte: ""
Oh ! Vous devez être le nouveau propriétaire ! Mme Girard m'a tout dit !: ""
Tu dois être Lola ?: ""
C'est toi Lola ?: ""
Le soleil de l'auberge: ""
Lola, c'est moi ! Le soleil de cette auberge, la confidente de Mme Girard, celle qui soigne les bobos et les cœurs !: ""
Et...: ""
Et je suis aussi celle qui accueille tout le monde à bras ouverts ! Qui s'assure que tout va bien dans cette grande maison. Tu sais, une auberge c'est comme une famille !: ""
Je...: ""
Je sais, je sais, tu dois être un peu dépassé ! C'est normal, tu arrives dans un endroit tout nouveau. Mais ne t'inquiète pas, avec moi dans les parages tu vas vite te sentir chez toi !: ""
...: ""
Tentative d'intervention: ""
Mais je te laisse parler ! Vas-y !: ""
Mais...: ""
Lola infirmière: ""
Ah oui, j'allais oublier ! Je fais des études d'infirmière. Je suis à l'écoute des maux et du monde. C'est un beau métier tu sais, exigeant, rigoureux, mais tellement humain ! Prendre soin des autres, être là quand ça ne va pas, c'est une vocation.: ""
Bon, j'ai du boulot qui m'attend ! Mais je suis vraiment ravie d'avoir rencontré le nouveau proprio. Comme disait Mme Girard, t'as l'air très gentil... mais pas très loquace ! À bientôt !: ""
Elle est vraiment jolie... Mais vraiment pipelette !: ""
Devant la porte d'Alicia: ""
Porte 2... Alicia. Curieux prénom. Je me demande bien qui se cache derrière cette porte.: ""
Alicia ouvre la porte: ""
Qui êtes-vous, humble visiteur ?: ""
Wooooh... C'est quoi cette chambre ? Un rituel satanique ? Elle fait flipper, cette nana.: ""
Bon... Bonjour mademoiselle.: ""
Très... jolie chambre.: ""
Le bonjour d'Alicia: ""
Bonjour à vous également. Et vous seriez... ?: ""
La chambre sobre: ""
Je vous remercie. J'avais pourtant essayé de faire sobre cette année. Mais qui êtes-vous donc pour vous permettre de commenter ma décoration ?: ""
Le joueur se présente: ""
Je suis le nouveau propriétaire de l'auberge.: ""
La révérence d'Alicia: ""
Je vous accueille avec révérence, nouveau maître des lieux. Sachez que vous m'aurez à votre service. Je vous dois loyauté et fidélité.: ""
Euh... merci.: ""
D'a... D'accord.: ""
Alicia criminologue: ""
Je suis étudiante en criminologie. Je ne fais pas de vague, pas de bruit. Sauf, naturellement, lorsque je reconstitue des scènes de crime. Cela peut arriver. Je vous prie de ne pas vous en alarmer.: ""
Je dois à présent rédiger une nécrologie avant le dîner. Je me dois de vous laisser. Ce fut un honneur.: ""
Quel personnage... Aussi jolie que glaçante !: ""
Devant la porte de Zven: ""
Zven... C'est un prénom ça. D'où ça peut bien venir ?: ""
Zven ouvre la porte: ""
Oh ! Le nouveau propriétaire ! C'est bien comme ça qu'on dit bonjour aux nouveaux arrivants ici ?: ""
Je suis pas un nouvel arrivant, je suis le propriétaire !: ""
Oui parfait ! Je suis le nouveau propriétaire !: ""
Zven et le programme d'échange: ""
Un nouveau propriétaire ! Une nouvelle personne à rencontrer ! Décidément ce programme d'échange ne ment pas !: ""
C'est quoi ton programme d'échange ?: ""
Ah tu viens pas d'ici ?: ""
L'île de Zven: ""
Je viens d'une île ! Une île que personne ne connait ici. Mais on a un programme d'échange universitaire avec le continent, alors me voilà ! C'est la première fois que je découvre tout ça. Tout est tellement différent !: ""
Tout est magique pour Zven: ""
Et ça se passe comment pour toi ?: ""
C'est incroyable ! Les voitures ! Il y en a partout, de toutes les couleurs ! Et Internet ! Sur l'île on en avait très peu mais ici c'est partout ! Et le cinéma ! J'y suis allée trois fois cette semaine ! Trois fois !: ""
Au revoir Zven: ""
J'espère que tu vas encore découvrir plein de choses !: ""
Oh oui ! Il y a tellement à voir ! Bonne journée nouveau propriétaire !: ""
Une vraie boule d'énergie... Et une jolie fille en plus !: ""
Le bilan: ""
Les cinq résidentes: ""
Mary l'artiste... belle, créative et complètement dans son monde. Et ce bazar dans sa chambre ! On aurait dit qu'une tornade était passée.: ""
Lise l'informaticienne... tellement mignonne et tellement timide. Elle a failli pas m'ouvrir la porte. Geek jusqu'au bout des ongles.: ""
Lola l'infirmière... jolie comme un cœur et bavarde comme une pie. Je n'ai pas pu placer un mot de toute la conversation.: ""
Alicia la criminologue gothique... troublante. Flippante mais fascinante. Et cette chambre... une nécrologie avant le dîner. Sérieusement.: ""
Et Zven... une pile électrique. Elle m'a sauté au cou avant même que je dise bonjour. Surexcitée par les voitures et Internet.: ""
L'illumination: ""
Elles ont quand même toutes un point commun : elles sont toutes plus jolies l'une que l'autre. Moi qui n'ai jamais été doué avec les filles...: ""
Me voilà entouré de cinq étudiantes qui feraient de parfaites petites copines ! Est-ce que j'aurai la chance de sortir avec l'une d'entre elles ?: ""
Attendez... Et si c'était ça le plan de l'oncle Alfred ? Il m'a peut-être légué cette auberge pour me sortir du célibat !: ""
La double mission: ""
J'ai donc une double mission : faire vivre cette auberge pour perpétuer la mémoire de mon oncle... et me trouver une copine parmi les résidentes !: ""
Mais pour ça, il va falloir que je me mette Mme Girard dans la poche. Elle connaît tout le monde ici, leurs habitudes, leurs goûts, leurs petits secrets. Et c'est clairement elle qui fait la pluie et le beau temps dans cette auberge.: ""
Mon plan est simple : devenir son allié en tant que nouveau propriétaire, et passer du temps avec chacune des filles pour trouver laquelle serait la meilleure petite amie potentielle. Mission acceptée !: ""